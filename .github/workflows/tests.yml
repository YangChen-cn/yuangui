name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: Swift tests
    # The app still targets macOS 15, but compilation needs the macOS 26 SDK
    # for APIs guarded by `#available(macOS 26, *)`.
    runs-on: macos-26
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Show Swift toolchain
        run: swift --version

      - name: Run tests
        run: swift test
